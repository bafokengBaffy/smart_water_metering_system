name: demo
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'  # Added SDK constraint

dependencies:
  flutter:
    sdk: flutter

  # Firebase packages
  firebase_core: ^3.10.1
  firebase_analytics: ^11.4.4
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_database: ^11.3.4
  firebase_storage: ^12.4.4
  firebase_messaging: ^15.2.4
  firebase_crashlytics: ^4.3.4
  firebase_remote_config: ^5.4.2
  firebase_performance: ^0.10.1+4
  firebase_in_app_messaging: ^0.8.1+4
  firebase_app_check: ^0.3.2+4

  # Other packages
  fl_chart: ^0.70.2
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  http: ^1.3.0
  image_picker: ^1.1.2
  shared_preferences: ^2.5.2
  fluttertoast: ^8.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  image_path: "assets/1024.png"

flutter:
  uses-material-design: true
  assets:
    - images/water.jpg
    - images/water2.jpg
    - images/water3.jpg
    - assets/1024.png