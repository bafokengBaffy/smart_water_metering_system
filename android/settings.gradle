pluginManagement {
    // Read the local.properties file to get the flutter SDK path
    def flutterSdkPath = file("local.properties").text
            .split("\n")
            .find { it.startsWith("flutter.sdk") }
            .split("=")[1].trim()

    assert flutterSdkPath != null, "flutter.sdk not set in local.properties"

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "<insert_compatible_version_here>"
    id "com.android.application" version "8.7.3" apply false
    id "org.jetbrains.kotlin.android" version "2.1.10" apply false
}

include ":app"
